name: 🌐 代理节点自动化抓取与测速

on:
  # 触发机制 1：定时任务（例如每 6 小时自动触发一次）
  schedule:
    - cron: '0 */6 * * *'
  # 触发机制 2：支持手动点击一键触发
  workflow_dispatch:

# 赋予工作流清除历史运行记录、提交归档文件所需的最高权限
permissions:
  actions: write
  contents: write

jobs:
  automation_flow:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整检出分支历史

      - name: 🐍 部署 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装流水线依赖组件
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml urllib3

      - name: 🚀 步骤 1：执行全网订阅源抓取与去重清洗
        run: |
          if [ -f "ProxyFlow-CI.py" ]; then
            python ProxyFlow-CI.py
          else
            echo "❌ 错误: 找不到抓取主脚本 ProxyFlow-CI.py！"
            exit 1
          fi

      - name: ⚙️ 步骤 2：下载并配置最新版 Mihomo (Clash.Meta) 内核
        run: |
          echo "正在获取 Mihomo Linux-AMD64 稳定版内核..."
          # 从官方 Alpha 或 Release 分支拉取纯净二进制文件
          curl -L -o mihomo.tar.gz https://github.com/MetaCubeX/Mihomo/releases/download/v1.18.9/mihomo-linux-amd64-v1.18.9.tar.gz
          tar -xzf mihomo.tar.gz
          mv mihomo-linux-amd64 mihomo
          chmod +x mihomo
          echo "✅ Mihomo 内核就绪。"

      - name: ⚡ 步骤 3：拉起并发内核并下发初筛测速
        run: |
          if [ -f "speedtest_action.py" ]; then
            python speedtest_action.py
          else
            echo "❌ 错误: 找不到测速脚本 speedtest_action.py！"
            exit 1
          fi

      - name: 📂 步骤 4：按照当天日期建立文件夹并归档数据
        run: |
          # 1. 设置时区为东八区（北京时间），获取当前日期
          TZ='Asia/Shanghai' CURRENT_DATE=$(date +%Y-%m-%d)
          ARCHIVE_DIR="archived/${CURRENT_DATE}"
          
          echo "🕒 当前北京时间日期: ${CURRENT_DATE}"
          echo "📁 正在创建归档目标目录: ${ARCHIVE_DIR}"
          mkdir -p "${ARCHIVE_DIR}"
          
          # 2. 健壮性文件备份：如果生成了测速结果，则强行拷贝到归档目录中
          if [ -f "valid_links.txt" ]; then
            cp "valid_links.txt" "${ARCHIVE_DIR}/valid_links.txt"
            echo "✅ 成功归档 valid_links.txt 到 ${ARCHIVE_DIR}/"
          else
            echo "⚠️ 警告: 未找到有效的 valid_links.txt 结果文件，跳过该项归档。"
          fi
          
          if [ -f "all_proxies.json" ]; then
            cp "all_proxies.json" "${ARCHIVE_DIR}/all_proxies.json"
            echo "✅ 成功归档全局纯净去重库 all_proxies.json 到 ${ARCHIVE_DIR}/"
          fi

      - name: ⬆️ 步骤 5：同步并推送到 GitHub 仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add valid_links.txt archived/
          
          # 只有当文件发生实质性改动时才提交，防止 Actions 报空提交错误
          if git diff --staged --quiet; then
            echo "✨ 节点无任何变动，无需提交代码。"
          else
            git commit -m "🌐 自动化初筛报告: $(date -d 'today' +'%Y-%m-%d %H:%M:%S') (自动按日期归档)"
            git push origin main
          fi

      - name: 🧹 步骤 6：利用 GitHub CLI 清理历史 Workflow Runs（仅保留最新一条）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 正在扫描本工作流的历史运行记录..."
          
          # 获取当前正在运行的 Workflow Run ID，防止误伤自己
          CURRENT_RUN_ID="${{ github.run_id }}"
          
          # 使用 GitHub 官方原生 CLI 获取除了当前这条外，所有历史运行的 ID 列表（最多扫描前 100 条历史）
          RUN_IDS=$(gh run list --workflow "${{ github.workflow }}" --limit 100 --json databaseId -q ".[].databaseId" | grep -v "$CURRENT_RUN_ID")
          
          if [ -z "$RUN_IDS" ]; then
            echo "🎉 仓库非常纯净，没有发现需要清理的历史运行记录。"
          else
            echo "发现历史冗余运行记录，开始执行毁灭性熔断清理..."
            for RUN_ID in $RUN_IDS; do
              echo "🗑️ 正在抹除历史 Workflow Run ID: ${RUN_ID}"
              gh run delete "$RUN_ID" || true
            done
            echo "✅ 历史清理完毕！Actions 页面已实现『仅保留最新一条』记录。"
          fi
